# S13 (docs/design-explorations/s13-ios-blueprint.md, §6 F3, Lane B) —
# HAND-written, not autogenerated: `register_listener`/`remove_listener`
# are framework-provided commands every Tauri mobile plugin gets for
# free (the base Swift `Plugin` class in tauri-apps/tauri's
# `ios-api/Sources/Tauri/Plugin/Plugin.swift` implements
# `registerListener`/`removeListener` directly — verified against that
# source), NOT `#[tauri::command]` fns declared in this crate's own
# `commands.rs`/`COMMANDS` (there are none — lib.rs's own header
# comment), so `tauri_plugin::Builder`'s autogeneration (build.rs, which
# only walks `COMMANDS`) can never produce a permission file for them.
# Without an explicit grant here, JS's `addPluginListener("os-speech",
# ...)` (-> `invoke("plugin:os-speech|register_listener", ...)`) and
# `PluginListener.unregister()` (-> `plugin:os-speech|remove_listener`)
# are silently denied by the ACL layer — no transcripts/status would
# ever ride the "transcript"/"status" event lanes at all. Identifiers
# follow the SAME autogenerated naming convention as every other
# command-scoped permission in this ecosystem (verified against the
# geolocation plugin's own `permissions/autogenerated/reference.md`:
# command `check_permissions` -> `geolocation:allow-check-permissions`,
# i.e. snake_case command name -> kebab-case `allow-`/`deny-` identifier)
# — `register_listener` -> `allow-register-listener`, so
# capabilities/ios.json (Lane A) can grant
# `"os-speech:allow-register-listener"` / `"os-speech:allow-remove-listener"`
# exactly as pinned.
"$schema" = "./schemas/schema.json"

[[permission]]
identifier = "allow-register-listener"
description = "Enables the framework-provided register_listener command (addPluginListener) without any pre-configured scope."
commands.allow = ["register_listener"]

[[permission]]
identifier = "deny-register-listener"
description = "Denies the framework-provided register_listener command (addPluginListener) without any pre-configured scope."
commands.deny = ["register_listener"]

[[permission]]
identifier = "allow-remove-listener"
description = "Enables the framework-provided remove_listener command (PluginListener.unregister) without any pre-configured scope."
commands.allow = ["remove_listener"]

[[permission]]
identifier = "deny-remove-listener"
description = "Denies the framework-provided remove_listener command (PluginListener.unregister) without any pre-configured scope."
commands.deny = ["remove_listener"]
