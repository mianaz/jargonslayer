# S13 §6 F3 — the default set grants exactly the two framework-provided
# listener permissions (listeners.toml's own header comment); there are
# no autogenerated command permissions to include (this plugin exposes
# no JS-invokable commands of its own, lib.rs's own header comment).
[default]
description = "Default permissions for the plugin: register_listener/remove_listener only (addPluginListener support for the transcript/status event lanes)."
permissions = ["allow-register-listener", "allow-remove-listener"]
