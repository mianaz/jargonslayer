<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <title>JargonSlayer Lite</title>
    <link rel="stylesheet" href="./panel.css" />
  </head>
  <body>
    <div id="app">
      <header class="js-header">
        <h1 class="js-title">JargonSlayer <span class="js-tag">Lite</span></h1>
        <p class="js-sub">粘贴英文商务文本，秒查黑话与术语</p>
      </header>

      <section class="js-capture-section">
        <div class="js-row">
          <button id="js-listen-btn" type="button" class="js-btn js-btn-primary">开始聆听</button>
          <span id="js-listen-status" class="js-status"></span>
        </div>

        <p id="js-privacy-line" class="js-privacy-line" hidden></p>
        <p id="js-capture-notice" class="js-status" hidden></p>
        <p id="js-saved-notice" class="js-status" hidden>本次转录已保存到历史记录。</p>

        <div id="js-grant-affordance" class="js-grant-affordance" hidden>
          <h3 class="js-grant-title">需要麦克风权限</h3>
          <p class="js-grant-desc">
            侧边栏里没法直接弹出授权。点下面的按钮会打开一个页面来申请麦克风权限，允许之后回到这里就能开始聆听。
          </p>
          <button id="js-grant-btn" type="button" class="js-btn">打开授权页面</button>
        </div>

        <p id="js-unsupported-notice" class="js-unsupported-notice" hidden>
          这个浏览器用不了语音识别，请用桌面版 Chrome。也可以直接粘贴文本来检测。
        </p>

        <div id="js-transcript" class="js-transcript">
          <p class="js-empty-hint">开始聆听后，识别到的文字会显示在这里。</p>
        </div>

        <div id="js-capture-cards" class="js-results">
          <p id="js-capture-empty-hint" class="js-empty-hint">检测结果会显示在这里。</p>
        </div>
      </section>

      <section class="js-input-section">
        <textarea
          id="js-input"
          class="js-input"
          rows="6"
          placeholder="Paste English text here… e.g. &quot;Let's circle back on the ARR numbers before we table this.&quot;"
        ></textarea>
        <div class="js-row">
          <button id="js-scan-btn" type="button" class="js-btn js-btn-primary">检测 · Scan</button>
          <span id="js-scan-status" class="js-status"></span>
        </div>
      </section>

      <section id="js-translate-section" class="js-translate-section" hidden>
        <div class="js-row">
          <button id="js-translate-btn" type="button" class="js-btn">翻译 · Translate</button>
          <span id="js-translate-status" class="js-status"></span>
        </div>
        <p id="js-translate-output" class="js-translate-output" hidden></p>
      </section>

      <section id="js-results" class="js-results">
        <p id="js-empty-hint" class="js-empty-hint">检测结果会显示在这里。</p>
      </section>

      <div id="js-history-mount"></div>

      <div id="js-locked-mount"></div>

      <footer class="js-footer">
        <span>内置词典 · 428/11 packs</span>
        <span class="js-footer-sep">·</span>
        <span>数据仅存本机；音频路径见上方提示</span>
        <span class="js-footer-sep">·</span>
        <span>语音识别仅支持桌面版 Chrome。</span>
      </footer>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
